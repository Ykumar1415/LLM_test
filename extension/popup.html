<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Live Translator</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <div class="top-toolbar">
            <button class="icon-btn" id="settings-toggle-btn" title="Toggle Settings">[ Settings ]</button>
            <div class="toolbar-status">
                <span class="status-badge" id="backend-status" title="Backend Status">
                    <span class="status-dot"></span>
                </span>
                <span class="status-badge" id="capture-status" title="Audio Capture Status">
                    <span class="status-dot off"></span>
                </span>
            </div>
            <div class="toolbar-actions">
                <button class="action-btn-small" id="toggle-btn" disabled>
                    <span class="btn-icon" id="btn-icon">[ Start ]</span>
                    <span class="btn-label" id="btn-label" style="display:none;"></span>
                </button>
            </div>
        </div>

        <div class="settings-block" id="settings-block" style="display: none;">
            <div class="setting-row">
                <label for="spokenLangSelect" title="Select the language being spoken to bypass auto-detect.">Spoken
                    Language:</label>
                <select id="spokenLangSelect">
                    <option value="auto">Auto-Detect (Mixed Languages)</option>
                    <option value="ja">Japanese Only</option>
                    <option value="en">English Only</option>
                </select>
            </div>

            <div class="setting-row">
                <label for="archSelect" title="Select the translation pipeline.">Translation Architecture:</label>
                <select id="archSelect">
                    <option value="vad_qwen">Streaming VAD + Qwen TRANSLATE</option>
                    <option value="vad_whisper_translate" selected>Streaming VAD + Whisper NATIVE TRANSLATE (Default)
                    </option>
                    <option value="sliding_window">Sliding Window (5s timer) + Qwen</option>
                    <option value="vad_raw">Streaming VAD (Raw Japanese Only)</option>
                </select>
            </div>

            <div class="setting-row">
                <label for="modelSelect">Ollama SLM Model:</label>
                <select id="modelSelect">
                    <!-- populated dynamically -->
                </select>
            </div>

            <div class="setting-row">
                <label for="vadSlider">VAD Threshold:</label>
                <div>
                    <input type="range" id="vadSlider" min="0.5" max="3.0" step="0.1" value="1.2">
                    <span id="vadValue">1.2</span>s
                </div>
            </div>
        </div>

        <div class="transcript-section">
            <div class="transcript-container" id="transcript-container">
                <div class="transcript-empty" id="transcript-empty">
                    [ Waiting for Audio / Click Start ]
                </div>
            </div>
        </div>

        <div class="error-banner" id="error-banner" style="display: none;">
            <span class="error-icon">[!]</span>
            <span class="error-text" id="error-text"></span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
