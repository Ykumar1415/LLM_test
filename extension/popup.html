<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Live Translator</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <div class="top-toolbar">
            <div class="toolbar-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span>Live Translator</span>
            </div>
            <div class="toolbar-status">
                <div class="status-badge" id="backend-status" title="Backend: Connecting...">
                    <svg class="status-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M8 12h8"></path>
                        <path d="M12 8v8"></path>
                    </svg>
                    <span class="status-dot"></span>
                </div>
                <div class="status-badge" id="capture-status" title="Audio: Idle">
                    <svg class="status-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                    <span class="status-dot off"></span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="action-btn" id="toggle-btn" disabled>
                    <svg class="btn-icon play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                    <svg class="btn-icon stop-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                    </svg>
                    <span class="btn-label" id="btn-label">Start</span>
                </button>
            </div>
        </div>

        <div class="language-tabs">
            <button class="tab-btn active" data-lang="en" id="tab-en">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 7h16M4 12h16M4 17h10"></path>
                </svg>
                <span>English</span>
            </button>
            <button class="tab-btn" data-lang="ja" id="tab-ja">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v6l4 2"></path>
                </svg>
                <span>日本語</span>
            </button>
            <button class="tab-btn download-btn" id="download-btn" title="Download Conversation">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
        </div>

        <div class="transcript-section">
            <div class="transcript-container" id="transcript-container">
                <div class="transcript-empty" id="transcript-empty">
                    [ Waiting for Audio / Click Start ]
                </div>
            </div>
        </div>

        <div class="error-banner" id="error-banner" style="display: none;">
            <span class="error-icon">[!]</span>
            <span class="error-text" id="error-text"></span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
